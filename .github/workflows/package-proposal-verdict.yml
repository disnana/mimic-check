name: "🛡️ Community Safety Consensus"

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  discussions: write
  contents: read

env:
  COOLING_OFF_DAYS: ${{ vars.COOLING_OFF_DAYS }}
  REQUIRED_SCORE: ${{ vars.REQUIRED_SCORE }}
  REJECTION_THRESHOLD: ${{ vars.REJECTION_THRESHOLD }}
  CATEGORY_SLUG: "package-proposal"

jobs:
  check-proposals:
    runs-on: ubuntu-latest
    steps:
      - name: Open GraphQL Query & Judge
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // 1. まずカテゴリのスラッグから、固有の「カテゴリID」を取得する
            const catQuery = `query($owner:String!, $name:String!) {
              repository(owner: $owner, name: $name) {
                discussionCategories(first: 50) {
                  nodes {
                    id
                    slug
                  }
                }
              }
            }`;

            const catVariables = {
              owner: context.repo.owner,
              name: context.repo.repo
            };

            const catResult = await github.graphql(catQuery, catVariables);
            const categories = catResult.repository.discussionCategories.nodes;
            const targetCategory = categories.find(c => c.slug === process.env.CATEGORY_SLUG);

            if (!targetCategory) {
              console.log(`❌ カテゴリ "${process.env.CATEGORY_SLUG}" が見つかりませんでした。`);
              return;
            }

            const categoryId = targetCategory.id;

            // 2. リポジトリ全体のDiscussionsから、該当カテゴリIDかつOPENなものを取得する
            const discQuery = `query($owner:String!, $name:String!, $categoryId:ID!) {
              repository(owner: $owner, name: $name) {
                discussions(first: 50, categoryId: $categoryId, states: [OPEN]) {
                  nodes {
                    id
                    title
                    createdAt
                    number
                    reactions(first: 100) {
                      nodes {
                        content
                      }
                    }
                  }
                }
              }
            }`;

            const discVariables = {
              owner: context.repo.owner,
              name: context.repo.repo,
              categoryId: categoryId
            };

            const discResult = await github.graphql(discQuery, discVariables);
            const discussions = discResult.repository.discussions.nodes;
            
            const now = new Date();
            const coolingOffPeriod = parseInt(process.env.COOLING_OFF_DAYS) * 86400000;
            const requiredScore = parseInt(process.env.REQUIRED_SCORE);
            const rejectionThreshold = parseInt(process.env.REJECTION_THRESHOLD);

            if (discussions.length === 0) {
              console.log("現在検証対象となるOPENな提案はありません。");
              return;
            }

            for (const discussion of discussions) {
              const createdDate = new Date(discussion.createdAt);
              
              // 猶予期間（日数）のチェック
              if (now - createdDate < coolingOffPeriod) {
                console.log(`Discussion #${discussion.number} はまだ猶予期間内です。スキップします。`);
                continue;
              }

              // 高評価・低評価の集計
              let thumbsUp = 0;
              let thumbsDown = 0;
              
              for (const reaction of discussion.reactions.nodes) {
                if (reaction.content === 'THUMBS_UP') thumbsUp++;
                if (reaction.content === 'THUMBS_DOWN') thumbsDown++;
              }

              const score = thumbsUp - thumbsDown;
              console.log(`Discussion #${discussion.number} [${discussion.title}] -> Score: ${score} (👍:${thumbsUp}, 👎:${thumbsDown})`);

              // 判定ロジック
              if (score >= requiredScore && thumbsDown < rejectionThreshold) {
                  console.log(`🎉 Discussion #${discussion.number} が承認ラインをクリアしました！`);
                  // 承認処理へ
              } else if (thumbsDown >= rejectionThreshold) {
                  console.log(`⚠️ Discussion #${discussion.number} は反対票が閾値(${rejectionThreshold})に達したため凍結します。`);
                  // 必要ならここで「凍結ラベル」を貼る処理を入れる
              } else {
                  console.log(`⏳ Discussion #${discussion.number} はまだ判定保留中です（Score: ${score}, 👎: ${thumbsDown}）。`);
              }
            }
