name: "📦 Daily Consensus Archiver"

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

permissions:
  discussions: write
  contents: write

jobs:
  archive-consensus:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Archive Decisions & Commit
        uses: actions/github-script@v7
        env:
          CATEGORY_SLUG: "package-proposal"
          BLACKLISTED_USERS: ${{ vars.BLACKLISTED_USERS }}
        with:
          script: |
            const fs = require('fs');
            const path = 'trusted.json';
            
            const repoInfoQuery = `query($owner:String!, $name:String!, $categorySlug:String) {
              repository(owner: $owner, name: $name) {
                discussionCategories(first: 50) {
                  nodes { id slug }
                }
                labels(first: 100) {
                  nodes { id name }
                }
              }
            }`;
            
            const initResult = await github.graphql(`query($owner:String!, $name:String!) {
              repository(owner: $owner, name: $name) {
                discussionCategories(first: 50) { nodes { id slug } }
                labels(first: 100) { nodes { id name } }
              }
            }`, { owner: context.repo.owner, name: context.repo.repo });
            
            const categories = initResult.repository.discussionCategories.nodes;
            const labelsNodes = initResult.repository.labels.nodes;
            const targetCategory = categories.find(c => c.slug === process.env.CATEGORY_SLUG);
            
            if (!targetCategory) {
              console.log(`❌ カテゴリ "${process.env.CATEGORY_SLUG}" が見つかりませんでした。`);
              return;
            }
            
            const recordedLabel = labelsNodes.find(l => l.name === "追加済み");
            if (!recordedLabel) {
              console.log("⚠️ 「追加済み」ラベルがリポジトリに見つかりません。");
              return;
            }

            const rawBlacklist = process.env.BLACKLISTED_USERS || "";
            const userBlacklist = rawBlacklist.split(/[,\n]/).map(u => u.trim().toLowerCase()).filter(u => u !== "");
            
            let hasNextPage = true;
            let cursor = null;
            const targetDiscussions = [];
            
            const mainQuery = `query($owner:String!, $name:String!, $categoryId:ID, $cursor:String) {
              repository(owner: $owner, name: $name) {
                discussions(first: 50, categoryId: $categoryId, after: $cursor) {
                  pageInfo { hasNextPage endCursor }
                  nodes {
                    id
                    number
                    body
                    closed
                    labels(first: 10) { nodes { name } }
                    reactions(first: 100) {
                      nodes {
                        user { login }
                      }
                    }
                  }
                }
              }
            }`;
            
            while (hasNextPage) {
              const result = await github.graphql(mainQuery, {
                owner: context.repo.owner,
                name: context.repo.repo,
                categoryId: targetCategory.id,
                cursor: cursor
              });
            
              const discData = result.repository.discussions;
              
              for (const disc of discData.nodes) {
                if (disc.closed) {
                  const hasApprove = disc.labels.nodes.some(l => l.name === "承認");
                  const hasReject = disc.labels.nodes.some(l => l.name === "拒否");
                  const hasRecorded = disc.labels.nodes.some(l => l.name === "追加済み");
            
                  if ((hasApprove || hasReject) && !hasRecorded) {
                    targetDiscussions.push(disc);
                  }
                }
              }
            
              hasNextPage = discData.pageInfo.hasNextPage;
              cursor = discData.pageInfo.endCursor;
            }
            
            if (targetDiscussions.length === 0) {
              console.log("本日新しく記録すべき確定済みの提案はありません（リアルタイムチェック結果）。");
              return;
            }
            
            let stateData = { trusted_packages: [], block_packages: [] };
            if (fs.existsSync(path)) {
              try {
                stateData = JSON.parse(fs.readFileSync(path, 'utf8'));
              } catch (e) {
                stateData = { trusted_packages: [], block_packages: [] };
              }
            }
            
            const todayStr = new Date().toISOString().split('T')[0];
            
            function extractSection(body, headerName) {
              const regex = new RegExp(`###\\s+${headerName}\\s+([\\s\\S]*?)(?=###|$)`, 'i');
              const match = body.match(regex);
              return match ? match[1].trim() : "";
            }
            
            for (const discussion of targetDiscussions) {
              const body = discussion.body || "";
              
              let pkgName = extractSection(body, "パッケージ名");
              let reason = extractSection(body, "理由");
            
              if (!pkgName) pkgName = `unknown-discussions-${discussion.number}`;
              if (!reason) reason = `Discussion #${discussion.number} で合意された処理。`;
            
              const votersSet = new Set();
              
              if (discussion.reactions && discussion.reactions.nodes) {
                for (const react of discussion.reactions.nodes) {
                  if (react.user && react.user.login) {
                    const username = react.user.login;
                    if (!userBlacklist.includes(username.toLowerCase())) {
                      votersSet.add(username);
                    }
                  }
                }
              }

              const verifiersList = votersSet.size > 0 ? Array.from(votersSet) : [context.actor];
              const isApproved = discussion.labels.nodes.some(l => l.name === "承認");
              
              const newRecord = {
                name: pkgName,
                reason: reason,
                date: todayStr,
                verifiers: verifiersList
              };
            
              if (isApproved) {
                  stateData.trusted_packages.push(newRecord);
                  console.log(`📝 trusted.json に追加 (Trusted): ${pkgName} by [${verifiersList.join(', ')}]`);
                } else {
                  stateData.block_packages.push(newRecord);
                  console.log(`📝 trusted.json に追加 (Block): ${pkgName} by [${verifiersList.join(', ')}]`);
                }
            
              await github.graphql(`mutation($id:ID!, $labelId:ID!) {
                addLabelsToLabelable(input: {labelableId: $id, labelIds: [$labelId]}) { clientMutationId }
              }`, { id: discussion.id, labelId: recordedLabel.id });
            }
            
            fs.writeFileSync(path, JSON.stringify(stateData, null, 2), 'utf8');

      - name: Commit and Push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          if [ -f trusted.json ]; then
            git add trusted.json
            git commit -m "🤖 chore: update trusted.json with parsed daily consensus [skip ci]" || echo "No changes to commit"
            git push
          fi